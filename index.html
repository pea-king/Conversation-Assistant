<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多轮对话助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        userBubble: '#165DFF',
                        assistantBubble: '#F5F7FA',
                        darkAssistantBubble: '#2D3440',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-thin {
                scrollbar-width: thin;
            }
            .scrollbar-thin::-webkit-scrollbar {
                width: 6px;
            }
            .scrollbar-thin::-webkit-scrollbar-track {
                background: transparent;
            }
            .scrollbar-thin::-webkit-scrollbar-thumb {
                background-color: rgba(156, 163, 175, 0.5);
                border-radius: 3px;
            }
            .typing-indicator span {
                animation: typing 1.4s infinite ease-in-out;
                display: inline-block;
            }
            .typing-indicator span:nth-child(2) {
                animation-delay: 0.2s;
            }
            .typing-indicator span:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes typing {
                0%, 60%, 100% {
                    transform: translateY(0);
                }
                30% {
                    transform: translateY(-5px);
                }
            }
            .avatar-icon {
                width: 32px !important;
                height: 32px !important;
                flex-shrink: 0 !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <div id="sidebar" class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col transition-transform duration-300 fixed h-full z-50 -translate-x-full md:translate-x-0">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <button id="newChatBtn" class="w-full bg-primary hover:bg-primary/90 text-white rounded-lg py-2 px-4 flex items-center justify-center gap-2 transition-colors">
                    <i class="fa fa-plus"></i>
                    <span>新建对话</span>
                </button>
                <button id="closeSidebar" class="md:hidden text-gray-400 hover:text-gray-600">
                    <i class="fa fa-times"></i>
                </button>
            </div>

            <div id="chatList" class="flex-1 overflow-y-auto scrollbar-thin p-2 space-y-1">
            </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
                <button id="clearChatBtn" class="w-full bg-orange-500 hover:bg-orange-600 text-white rounded-lg py-2 px-4 flex items-center justify-center gap-2 transition-colors">
                    <i class="fa fa-trash"></i>
                    <span>清空当前对话</span>
                </button>

                <button id="exportBtn" class="w-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg py-2 px-4 flex items-center justify-center gap-2 transition-colors">
                    <i class="fa fa-download"></i>
                    <span>导出聊天记录</span>
                </button>

                <button id="themeToggle" class="w-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg py-2 px-4 flex items-center justify-center gap-2 transition-colors">
                    <i class="fa fa-moon-o dark:hidden"></i>
                    <i class="fa fa-sun-o hidden dark:inline"></i>
                    <span class="dark:hidden">深色模式</span>
                    <span class="hidden dark:inline">浅色模式</span>
                </button>
            </div>
        </div>

        <div id="overlay" class="fixed inset-0 bg-black/40 z-40 hidden md:hidden"></div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 p-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button id="openSidebar" class="md:hidden text-gray-600 dark:text-gray-300">
                        <i class="fa fa-bars text-xl"></i>
                    </button>
                    <h1 class="text-xl font-semibold text-gray-800 dark:text-white">多轮对话助手</h1>
                </div>

                <div class="flex items-center gap-2">
                    <div id="apiKeyStatus" class="text-sm text-gray-500 dark:text-gray-400">
                        <i class="fa fa-key mr-1"></i>
                        <span id="apiKeyStatusText">未设置API Key</span>
                    </div>
                    <button id="apiKeyBtn" class="text-sm bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg py-1 px-3 transition-colors">
                        设置
                    </button>
                </div>
            </header>

            <div id="apiKeyModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
                <div class="bg-white dark:bg-gray-800 rounded-lg p-6 w-full max-w-md mx-4 shadow-xl">
                    <h2 class="text-xl font-semibold text-gray-800 dark:text-white mb-4">设置阿里云百炼API Key</h2>
                    <p class="text-gray-600 dark:text-gray-300 mb-4 text-sm">密钥仅保存在本地，不会上传</p>
                    <input type="password" id="apiKeyInput" placeholder="sk-xxxx" class="w-full border border-gray-300 dark:border-gray-600 rounded-lg py-2 px-4 mb-4">
                    <div class="flex justify-end gap-2">
                        <button id="cancelApiKeyBtn" class="bg-gray-200 px-4 py-2 rounded">取消</button>
                        <button id="saveApiKeyBtn" class="bg-primary text-white px-4 py-2 rounded">保存</button>
                    </div>
                </div>
            </div>

            <div id="chatContainer" class="flex-1 overflow-y-auto scrollbar-thin p-4 space-y-4">
                <div id="welcomeMessage" class="max-w-3xl mx-auto text-center py-12">
                    <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa fa-comments text-primary text-2xl"></i>
                    </div>
                    <h2 class="text-2xl font-semibold text-gray-800 dark:text-white mb-2">欢迎使用多轮对话助手</h2>
                    <p class="text-gray-600 dark:text-gray-300 mb-6">
                        请先点击右上角"设置"按钮输入您的API Key，然后开始对话。
                    </p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 max-w-2xl mx-auto">
                        <button class="example-btn bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg py-3 px-4 text-left transition-colors">
                            <i class="fa fa-lightbulb-o mr-2 text-primary"></i>
                            帮我写一个Python爬虫
                        </button>
                        <button class="example-btn bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg py-3 px-4 text-left transition-colors">
                            <i class="fa fa-code mr-2 text-primary"></i>
                            解释一下什么是RESTful API
                        </button>
                        <button class="example-btn bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg py-3 px-4 text-left transition-colors">
                            <i class="fa fa-book mr-2 text-primary"></i>
                            推荐几本学习人工智能的书
                        </button>
                        <button class="example-btn bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg py-3 px-4 text-left transition-colors">
                            <i class="fa fa-coffee mr-2 text-primary"></i>
                            写一份周末出游计划
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 p-4">
                <div class="max-w-3xl mx-auto">
                    <div class="relative bg-gray-100 dark:bg-gray-700 rounded-lg border border-gray-300 dark:border-gray-600">
                        <textarea id="userInput" placeholder="输入您的问题..." rows="1" class="w-full bg-transparent py-3 px-4 pr-24 text-gray-800 dark:text-white focus:outline-none resize-none max-h-48"></textarea>
                        <div class="absolute right-2 bottom-2 flex gap-2">
                            <button id="stopBtn" class="hidden bg-gray-200 dark:bg-gray-600 px-3 py-1 rounded">停止</button>
                            <button id="sendBtn" class="bg-primary text-white px-3 py-1 rounded">发送</button>
                        </div>
                    </div>
                    <p class="text-xs text-center text-gray-500 mt-2">Enter 发送，Shift+Enter 换行</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            model: 'qwen3.6-plus',
            baseURL: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions',
            maxHistoryLength: 50,
            temperature: 0.7,
        };

        let state = {
            apiKey: localStorage.getItem('aliyunApiKey') || '',
            currentChatId: null,
            chats: JSON.parse(localStorage.getItem('aliyunChats') || '[]'),
            isGenerating: false,
            abortController: null,
            generatingChatId: null,
        };

        const elements = {
            sidebar: document.getElementById('sidebar'),
            overlay: document.getElementById('overlay'),
            openSidebar: document.getElementById('openSidebar'),
            closeSidebar: document.getElementById('closeSidebar'),
            clearChatBtn: document.getElementById('clearChatBtn'),
            chatList: document.getElementById('chatList'),
            chatContainer: document.getElementById('chatContainer'),
            userInput: document.getElementById('userInput'),
            sendBtn: document.getElementById('sendBtn'),
            stopBtn: document.getElementById('stopBtn'),
            newChatBtn: document.getElementById('newChatBtn'),
            exportBtn: document.getElementById('exportBtn'),
            themeToggle: document.getElementById('themeToggle'),
            apiKeyBtn: document.getElementById('apiKeyBtn'),
            apiKeyModal: document.getElementById('apiKeyModal'),
            apiKeyInput: document.getElementById('apiKeyInput'),
            saveApiKeyBtn: document.getElementById('saveApiKeyBtn'),
            cancelApiKeyBtn: document.getElementById('cancelApiKeyBtn'),
            apiKeyStatusText: document.getElementById('apiKeyStatusText'),
            apiKeyStatus: document.getElementById('apiKeyStatus'),
            welcomeMessage: document.getElementById('welcomeMessage'),
            exampleBtns: document.querySelectorAll('.example-btn'),
        };

        function init() {
            if (localStorage.getItem('darkMode') === 'true') {
                document.documentElement.classList.add('dark');
            }
            updateApiKeyStatus();
            renderChatList();
            if (state.chats.length) loadChat(state.chats[0].id);

            elements.exampleBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    elements.userInput.value = btn.textContent.trim();
                    elements.userInput.focus();
                });
            });

            bindEvents();
        }

        function bindEvents() {
            elements.openSidebar.onclick = () => {
                elements.sidebar.classList.remove('-translate-x-full');
                elements.overlay.classList.remove('hidden');
            };
            elements.closeSidebar.onclick = () => {
                elements.sidebar.classList.add('-translate-x-full');
                elements.overlay.classList.add('hidden');
            };
            elements.overlay.onclick = elements.closeSidebar.onclick;

            elements.clearChatBtn.onclick = clearCurrentChat;
            elements.sendBtn.onclick = sendMessage;
            elements.stopBtn.onclick = stopGeneration;
            elements.newChatBtn.onclick = createNewChat;
            elements.exportBtn.onclick = exportChatHistory;
            elements.themeToggle.onclick = toggleTheme;
            elements.apiKeyBtn.onclick = () => elements.apiKeyModal.classList.remove('hidden');
            elements.saveApiKeyBtn.onclick = saveApiKey;
            elements.cancelApiKeyBtn.onclick = () => elements.apiKeyModal.classList.add('hidden');

            elements.userInput.onkeydown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };
        }

        function clearCurrentChat() {
            if (!state.currentChatId) return;
            if (!confirm('确定要清空当前对话所有消息吗？')) return;
            const chat = state.chats.find(c => c.id === state.currentChatId);
            if (chat) {
                chat.messages = [];
                saveChatsToLocalStorage();
                loadChat(state.currentChatId);
            }
        }

        function updateApiKeyStatus() {
            if (state.apiKey) {
                elements.apiKeyStatusText.textContent = '已设置API Key';
                elements.apiKeyStatus.classList.remove('text-red-500');
                elements.apiKeyStatus.classList.add('text-green-500');
            } else {
                elements.apiKeyStatusText.textContent = '未设置API Key';
                elements.apiKeyStatus.classList.remove('text-green-500');
                elements.apiKeyStatus.classList.add('text-red-500');
            }
        }

        function saveApiKey() {
            const v = elements.apiKeyInput.value.trim();
            if (!v) return alert('请输入API Key');
            state.apiKey = v;
            localStorage.setItem('aliyunApiKey', v);
            updateApiKeyStatus();
            elements.apiKeyModal.classList.add('hidden');
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }

        function createNewChat() {
            const chatId = Date.now().toString();
            state.chats.unshift({ id: chatId, title: '新对话', messages: [], createdAt: new Date().toISOString() });
            saveChatsToLocalStorage();
            renderChatList();
            loadChat(chatId);
            elements.userInput.focus();
            elements.closeSidebar.onclick();
        }

        function renderChatList() {
            elements.chatList.innerHTML = '';
            state.chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `flex items-center justify-between p-2.5 rounded-lg cursor-pointer ${chat.id === state.currentChatId ? 'bg-primary/10 text-primary' : 'hover:bg-gray-100 dark:hover:bg-gray-700'}`;
                div.innerHTML = `<div class="truncate text-sm"><i class="fa fa-comment-o mr-2"></i>${chat.title}</div><button class="del-btn text-red-500 opacity-0 hover:opacity-100"><i class="fa fa-trash-o"></i></button>`;
                div.onclick = (e) => {
                    if (e.target.closest('.del-btn')) {
                        if (confirm('删除该对话？')) {
                            state.chats = state.chats.filter(c => c.id !== chat.id);
                            saveChatsToLocalStorage();
                            renderChatList();
                            if (state.currentChatId === chat.id) {
                                state.currentChatId = null;
                                elements.chatContainer.innerHTML = '';
                                elements.welcomeMessage.classList.remove('hidden');
                            }
                        }
                    } else {
                        state.currentChatId = chat.id;
                        renderChatList();
                        loadChat(chat.id);
                        elements.closeSidebar.onclick();
                    }
                };
                elements.chatList.appendChild(div);
            });
        }

        function loadChat(chatId) {
            state.currentChatId = chatId;
            const chat = state.chats.find(c => c.id === chatId);
            if (!chat) return;

            elements.chatContainer.innerHTML = '';
            elements.chatContainer.appendChild(elements.welcomeMessage);

            if (chat.messages.length > 0) {
                elements.welcomeMessage.classList.add('hidden');
                chat.messages.forEach(msg => addMessageToUI(msg.role, msg.content));
            } else {
                elements.welcomeMessage.classList.remove('hidden');
            }
            scrollToBottom();
        }

        function saveChatsToLocalStorage() {
            localStorage.setItem('aliyunChats', JSON.stringify(state.chats));
        }

        async function sendMessage() {
            const content = elements.userInput.value.trim();
            if (!content) return;
            if (!state.apiKey) return alert('请先设置API Key');
            if (state.isGenerating) return;

            if (!state.currentChatId) createNewChat();

            elements.userInput.value = '';
            elements.welcomeMessage.classList.add('hidden');
            addMessageToUI('user', content);

            const chat = state.chats.find(c => c.id === state.currentChatId);
            chat.messages.push({ role: 'user', content });

            if (chat.messages.length === 1) {
                chat.title = content.length > 20 ? content.slice(0, 20) + '...' : content;
                renderChatList();
            }
            saveChatsToLocalStorage();
            await generateResponse();
        }

        async function generateResponse() {
            state.isGenerating = true;
            state.generatingChatId = state.currentChatId;
            elements.sendBtn.disabled = true;
            elements.stopBtn.classList.remove('hidden');

            const chat = state.chats.find(c => c.id === state.generatingChatId);
            const messages = chat.messages.slice(-CONFIG.maxHistoryLength);
            const bubble = addEmptyAssistantBubble();
            let full = '';

            try {
                state.abortController = new AbortController();
                const res = await fetch(CONFIG.baseURL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${state.apiKey}`
                    },
                    body: JSON.stringify({
                        model: CONFIG.model,
                        messages,
                        stream: true,
                        temperature: CONFIG.temperature
                    }),
                    signal: state.abortController.signal
                });

                if (!res.ok) throw new Error('API 请求失败');
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buf = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buf += decoder.decode(value, { stream: true });
                    const lines = buf.split('\n');
                    buf = lines.pop() || '';
                    for (const line of lines) {
                        const l = line.trim();
                        if (!l.startsWith('data: ')) continue;
                        const data = l.substring(6);
                        if (data === '[DONE]') continue;
                        try {
                            const json = JSON.parse(data);
                            const c = json.choices?.[0]?.delta?.content || '';
                            if (c) {
                                full += c;
                                if (state.generatingChatId === chat.id) {
                                    bubble.innerHTML = DOMPurify.sanitize(marked.parse(full));
                                    scrollToBottom();
                                }
                            }
                        } catch (e) {}
                    }
                }

                chat.messages.push({ role: 'assistant', content: full });
                saveChatsToLocalStorage();

            } catch (e) {
                if (e.name !== 'AbortError') {
                    bubble.innerHTML = `<p class="text-red-500">错误：${e.message}</p>`;
                }
            } finally {
                state.isGenerating = false;
                state.generatingChatId = null;
                elements.sendBtn.disabled = false;
                elements.stopBtn.classList.add('hidden');
                state.abortController = null;
            }
        }

        function stopGeneration() {
            if (state.abortController) state.abortController.abort();
        }

        function addEmptyAssistantBubble() {
            const div = document.createElement('div');
            div.className = 'max-w-3xl mx-auto flex justify-start';
            div.innerHTML = `
                <div class="flex flex-row items-start gap-3 max-w-[85%]">
                    <div class="avatar-icon rounded-full bg-gray-200 dark:bg-gray-600 flex items-center justify-center">
                        <i class="fa fa-robot text-sm"></i>
                    </div>
                    <div class="bg-assistantBubble dark:bg-darkAssistantBubble text-gray-800 dark:text-gray-200 rounded-lg p-3 prose dark:prose-invert"></div>
                </div>
            `;
            elements.chatContainer.appendChild(div);
            scrollToBottom();
            return div.querySelector('.prose');
        }

        function addMessageToUI(role, content) {
            const div = document.createElement('div');
            div.className = `max-w-3xl mx-auto flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            const bubbleClass = role === 'user'
                ? 'bg-userBubble text-white rounded-lg'
                : 'bg-assistantBubble dark:bg-darkAssistantBubble text-gray-800 dark:text-gray-200 rounded-lg';
            const icon = role === 'user'
                ? '<div class="avatar-icon rounded-full bg-userBubble text-white flex items-center justify-center"><i class="fa fa-user text-sm"></i></div>'
                : '<div class="avatar-icon rounded-full bg-gray-200 dark:bg-gray-600 flex items-center justify-center"><i class="fa fa-robot text-sm"></i></div>';
            div.innerHTML = `
                <div class="flex ${role === 'user' ? 'flex-row-reverse' : 'flex-row'} items-start gap-3 max-w-[85%]">
                    ${icon}
                    <div class="${bubbleClass} p-3 prose dark:prose-invert max-w-none">
                        ${DOMPurify.sanitize(marked.parse(content))}
                    </div>
                </div>
            `;
            elements.chatContainer.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            elements.chatContainer.scrollTop = elements.chatContainer.scrollHeight;
        }

        function exportChatHistory() {
            if (!state.currentChatId) return alert('请选择对话');
            const chat = state.chats.find(c => c.id === state.currentChatId);
            if (!chat.messages.length) return alert('暂无消息可导出');
            let text = `# ${chat.title}\n导出时间：${new Date().toLocaleString()}\n\n`;
            chat.messages.forEach(m => {
                text += (m.role === 'user' ? '我：' : '助手：') + m.content + '\n\n';
            });
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `对话记录_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
